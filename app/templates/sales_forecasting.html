{% extends "layout.html" %}
{% block content %}

<div class="dashboard-shell">
    <nav class="dashboard-tabs">
        <a href="{{ url_for('main.dashboard') }}">Dashboard</a>
        <a href="{{ url_for('main.ev_routing') }}">EV Smart Routing</a>
        <a class="active">Sales Forecasting</a>
        <a href="{{ url_for('main.parts_procurement') }}">Parts Procurement</a>
        <a href="{{ url_for('main.profile') }}">Profile</a>
        <a href="{{ url_for('main.logout') }}" class="logout-btn">Log Out</a>
    </nav>
    
    <main class="dashboard-page">
        <h1>Sales Forecasting</h1>
        <div class="forecast-controls">
            <div>
                <label>Select Vehicle Model</label>
                <select id="vehicleSelect">
                    <option>Avanza</option>
                    <option>Corolla Cross</option>
                    <option>Fortuner</option>
                    <option>Hilux</option>
                    <option>Innova</option>
                    <option>Raize</option>
                    <option>Vios</option>
                    <option>Wigo</option>
                </select>
            </div>

            <div>
                <label>Forecast Horizon (months)</label>
                <select id="monthSelect">
                    <option value="1">1</option>
                    <option value="3">3</option>
                    <option value="6">6</option>
                    <option value="12" selected>12</option>
                </select>
            </div>

        </div>

        <button onclick="generateForecast()" class="forecast-btn">
            Generate Forecast
        </button>

        <div id="forecastChart"></div>

        <table id="forecastTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Forecast</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </main>
</div>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script src="{{ url_for('static', filename='js/sales_forecast.js') }}"></script>

{% endblock %}
