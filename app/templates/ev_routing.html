{% extends "layout.html" %}
{% block content %}

<div class="dashboard-shell">

    <nav class="dashboard-tabs">
        <a href="{{ url_for('main.dashboard') }}">Dashboard</a>
        <a class="active">EV Smart Routing</a>
        <a href="{{ url_for('main.sales_forecasting') }}">Sales Forecasting</a>
        <a href="{{ url_for('main.parts_procurement') }}">Parts Procurement</a>
        <a href="{{ url_for('main.profile') }}">Profile</a>
        <a href="{{ url_for('main.logout') }}" class="logout-btn">Log Out</a>
    </nav>

    <main class="dashboard-page">
        <h1>EV Smart Routing</h1>
        <!-- STATUS -->
        <!-- STATUS -->
    <div class="ev-status">

        <h2 class="route-title">Route inputs</h2>

        <div class="route-inputs">
            <div class="route-left">
                <label>Location</label>
                <input id="startInput" type="text" placeholder="Start location">

                <label>Destination</label>
                <input id="destinationInput" type="text" placeholder="Destination">
            </div>

            <!-- RIGHT COLUMN -->
            <div class="route-right">
                <label>Battery Percentage (%)</label>
                <input id="batteryInput" type="number" placeholder="Battery %" min="1" max="100">
                <button id="routeBtn">Start Routing</button>
            </div>

            <!-- ROUTE SUMMARY -->
            <div class="route-summary">

                <div class="summary-card">
                    <p>Distance (km)</p>
                    <h2 id="distanceValue">0</h2>
                </div>

                <div class="summary-card">
                    <p>Battery Distance (km)</p>
                    <h2 id="batteryRangeValue">0</h2>
                </div>

                <div class="summary-card">
                    <p>Battery Status</p>
                    <h2 id="batteryStatus" class="status-safe">OK</h2>
                </div>

            </div>
        </div>

    </div>

        <!-- SMART MAP -->
        <div id="map"></div>

        <!-- SYSTEM DECISION -->
        <div id="routeInfo" class="route-info"></div>
    </main>
</div>

<link rel="stylesheet"
 href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="{{ url_for('static', filename='js/ev_map.js') }}"></script>

{% endblock %}
