{% extends "layout.html" %}
{% block content %}

<div class="dashboard-shell">
    <nav class="dashboard-tabs">
        <a href="{{ url_for('main.dashboard') }}">Dashboard</a>
        <a href="{{ url_for('main.ev_routing') }}">EV Smart Routing</a>
        <a class="active">Sales Forecasting</a>
        <a href="{{ url_for('main.parts_procurement') }}">Parts Procurement</a>
        <a href="{{ url_for('main.profile') }}">Profile</a>
        <a href="{{ url_for('main.logout') }}" class="logout-btn">Log Out</a>
    </nav>
    
    <main class="dashboard-page">
        <h1>Sales Forecasting</h1>
        <div class="forecast-controls">
            <div class="left-row">
                <label>Select Vehicle Model</label>
                <select id="vehicleSelect">
                    <option>Avanza</option>
                    <option>Corolla Cross</option>
                    <option>Fortuner</option>
                    <option>Hilux</option>
                    <option>Innova</option>
                    <option>Raize</option>
                    <option>Vios</option>
                    <option>Wigo</option>
                </select>
            </div>

            <div class="right-row">
                <label>Forecast Horizon (months)</label>
                <select id="monthSelect">
                    <option value="1">1</option>
                    <option value="3">3</option>
                    <option value="6">6</option>
                    <option value="12" selected>12</option>
                </select>
            </div>
            <button onclick="generateForecast()" class="forecast-btn">
                Generate Forecast
            </button>
        </div>

        <!-- ================= RESULTS ================= -->
        <div id="forecastResults" style="display:none; margin-top:30px;">
            <h2 id="forecastTitle"></h2>
            <canvas id="forecastChart"></canvas>
            <h3 style="margin-top:25px;">Forecast Table</h3>
            <table class="forecast-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Forecast</th>
                    </tr>
                </thead>
                <tbody id="forecastTable"></tbody>
            </table>
        </div>
    </main>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="sales_forecast.js"></script>

{% endblock %}
