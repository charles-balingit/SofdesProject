{% extends "layout.html" %}
{% block content %}

<div class="dashboard-shell">

    <nav class="dashboard-tabs">
        <a href="{{ url_for('main.dashboard') }}">Dashboard</a>
        <a class="active">EV Smart Routing</a>
        <a href="{{ url_for('main.sales_forecasting') }}">Sales Forecasting</a>
        <a href="{{ url_for('main.parts_procurement') }}">Parts Procurement</a>
        <a href="{{ url_for('main.profile') }}">Profile</a>
    </nav>

    <div class="ev-routing-container">
    <h1>EV Smart Routing</h1>
    <p class="subtitle">
        Type in starting point and destination to compute smart EV routing.
    </p>

        <!-- INPUT CARD -->
        <div class="route-card">
            <div class="route-grid">
                <!-- START -->
                <div class="input-group">
                    <label>Start location</label>
                    <input type="text"
                        id="startInput"
                        placeholder="e.g. Quezon City, Metro Manila">
                </div>

                <!-- DESTINATION -->
                <div class="input-group">
                    <label>Destination</label>
                    <input type="text"
                        id="destinationInput"
                        placeholder="e.g. Makati, Metro Manila">
                </div>

                <!-- BATTERY -->
                <div class="input-group">
                    <label>Battery Percentage (%)</label>
                    <input type="number"
                        id="batteryInput"
                        min="1"
                        max="100"
                        placeholder="Enter battery level">
                </div>
            </div>

            <!-- BUTTONS -->
            <div class="button-group">
                <button class="btn compute-btn" onclick="computeRoute()">
                    Compute Route
                </button>

                <button class="btn clear-btn" onclick="clearRoute()">
                    Clear Route
                </button>
            </div>
        </div>
        <!-- SMART MAP -->
        <div id="map"></div>

        <!-- SYSTEM DECISION -->
        <div id="routeInfo" class="route-info"></div>
    </div>
</div>

<link rel="stylesheet"
 href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="{{ url_for('static', filename='js/ev_map.js') }}"></script>

{% endblock %}
