{% extends "layout.html" %}
{% block content %}

<div class="dashboard-page">

    <!-- PAGE HEADER -->
    <div class="page-header">
        <h1>Sales Forecasting</h1>
        <p>
            Forecast future vehicle sales based on the selected Toyota EV model and forecast horizon.
        </p>
    </div>

    <!-- INPUT CARD -->
    <div class="stat-card" style="margin-top:25px;">

        <h2 style="margin-top:0;">Forecast Inputs</h2>

        <div class="forecast-form-grid">

            <div>
                <label>Select Vehicle Model</label>
                <select id="vehicleModel" class="form-control">
                    <option value="">Select Vehicle Model</option>
                    {% for model in vehicle_models %}
                        <option value="{{ model }}">{{ model }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label>Forecast Horizon (months)</label>
                <input
                    type="number"
                    id="forecastHorizon"
                    class="form-control"
                    min="1"
                    max="12"
                    value="12"
                >
            </div>

            <div class="forecast-btn-wrapper">
                <button id="generateForecastBtn" class="primary-btn">
                    Generate Forecast
                </button>
            </div>

        </div>

        <div id="salesError" class="error" style="display:none; margin-top:15px;"></div>

    </div>


    <!-- RESULTS CARD -->
    <div id="salesResults" class="stat-card" style="display:none; margin-top:25px;">

        <h2 id="forecastTitle">Forecast Result</h2>

        <!-- CHART -->
        <div class="chart-container">
            <canvas id="salesChart"></canvas>
        </div>

        <!-- TABLE -->
        <div style="margin-top:25px;">
            <h3>Monthly Forecast Values</h3>

            <table class="forecast-table" id="salesTable">
                <thead>
                    <tr>
                        <th>Month</th>
                        <th>Forecast Value</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
